<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>1099 PMHNP Jobs — Hero Layouts</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30&family=Instrument+Serif:ital@0;1&family=GT+Sectra&family=Newsreader:opsz,wght@6..72,300..700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --pink:#d49da0;        /* main warm dusty pink (from reference) */
    --pink-deep:#c08589;
    --pink-light:#e8c4c5;
    --pink-pale:#f3dcdb;
    --cream:#f6efe7;
    --paper:#faf6ef;
    --ink:#1f1a17;
    --ink-soft:#3d342d;
    --teal:#15806b;        /* the green/teal accent */
    --teal-deep:#0f6354;
    --teal-soft:#d8ebe4;
    --gold:#b8893f;
    --rule:rgba(31,26,23,.16);
  }
  html,body{margin:0;background:#f0eee9;font-family:'Inter',system-ui,sans-serif;color:var(--ink);}
  *{box-sizing:border-box}

  /* ---------- shared hero primitives ---------- */
  .hero{position:relative;font-family:'Inter',system-ui,sans-serif;color:var(--ink);overflow:hidden;}
  .eyebrow{font:600 11px/1 'Inter',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);}
  .display{font-family:'Fraunces',serif;font-weight:400;letter-spacing:-.02em;line-height:.95;}
  .display em{font-style:italic;color:var(--teal);font-weight:400;}
  .body{font:400 15px/1.55 'Inter',sans-serif;color:var(--ink-soft);max-width:48ch;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:999px;font:600 14px/1 'Inter',sans-serif;text-decoration:none;cursor:pointer;border:1px solid transparent;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;}
  .btn .arr{display:inline-block;transition:transform .2s ease}
  .btn:hover .arr{transform:translateX(3px)}
  .btn-primary{background:var(--teal);color:#fff;}
  .btn-primary:hover{background:var(--teal-deep);}
  .btn-ghost{background:transparent;color:var(--ink);border-color:rgba(31,26,23,.18);}
  .btn-ghost:hover{background:rgba(31,26,23,.04);}
  .btn-light{background:rgba(255,255,255,.85);color:var(--ink);}
  .btn-light:hover{background:#fff;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.55);border:1px solid rgba(31,26,23,.1);font:500 12px/1 'Inter',sans-serif;color:var(--ink-soft)}
  .dot{width:6px;height:6px;border-radius:99px;background:var(--teal);display:inline-block}

  /* ---------- (1) editorial reference baseline ---------- */
  .h1{background:var(--pink);padding:72px 80px;display:grid;grid-template-columns:1fr 1.05fr;align-items:center;gap:48px;}
  .h1 .stack{max-width:520px}
  .h1 h1{font-size:88px;margin:14px 0 22px;}
  .h1 .body{margin-bottom:32px}
  .h1 .ctas{display:flex;gap:12px}
  .h1 .illo{position:relative;justify-self:end;width:100%;max-width:640px;}
  .h1 .illo img{width:100%;display:block}

  /* ---------- (2) full bleed, illustration-as-canvas, type overlay ---------- */
  .h2{position:relative;height:780px;background:var(--pink);}
  .h2 .bg{position:absolute;inset:0;background-image:url('assets/illustration-cropped.png');background-size:cover;background-position:right center;}
  .h2 .scrim{position:absolute;inset:0;background:linear-gradient(90deg, rgba(212,157,160,.96) 0%, rgba(212,157,160,.85) 38%, rgba(212,157,160,0) 62%);}
  .h2 .inner{position:relative;height:100%;padding:80px 80px;display:grid;grid-template-rows:auto 1fr auto;gap:24px;color:var(--ink);}
  .h2 .topbar{display:flex;align-items:center;justify-content:space-between;font:500 13px/1 'Inter',sans-serif;color:var(--ink-soft);}
  .h2 .topbar .crumbs{display:flex;align-items:center;gap:10px;}
  .h2 .topbar .crumbs span:not(:last-child)::after{content:"/";margin-left:10px;color:rgba(31,26,23,.35)}
  .h2 .topbar .filters{display:flex;gap:8px}
  .h2 h1{font-size:144px;letter-spacing:-.035em;margin:0;max-width:14ch;}
  .h2 .meta{display:grid;grid-template-columns:1.4fr auto auto auto;gap:48px;align-items:end;border-top:1px solid rgba(31,26,23,.16);padding-top:24px;}
  .h2 .meta .body{margin:0;max-width:46ch}
  .h2 .stat{font-family:'Fraunces',serif;}
  .h2 .stat .n{font-size:40px;line-height:1;display:block;font-weight:400}
  .h2 .stat .l{font:500 11px/1 'Inter',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-top:8px;display:block}
  .h2 .ctas{display:flex;gap:12px;justify-self:end;align-self:end;grid-column:4}

  /* ---------- (3) magazine grid: serif-led editorial w/ side rail ---------- */
  .h3{background:var(--paper);padding:0;display:grid;grid-template-columns:120px 1fr 1fr 1fr;grid-template-rows:auto;border-bottom:1px solid var(--rule);}
  .h3 .rail{border-right:1px solid var(--rule);padding:28px 18px;display:flex;flex-direction:column;justify-content:space-between;font:500 11px/1.4 'Inter',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);min-height:600px;}
  .h3 .rail .vol{transform:rotate(-90deg);transform-origin:left top;white-space:nowrap;margin-top:auto;color:var(--ink-soft);}
  .h3 .lede{padding:64px 40px 40px;border-right:1px solid var(--rule);}
  .h3 .lede .kicker{display:flex;align-items:center;gap:10px;font:500 12px/1 'Inter',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:28px;}
  .h3 .lede .kicker .sw{width:24px;height:1px;background:var(--teal)}
  .h3 .lede h1{font-family:'Fraunces',serif;font-size:80px;line-height:.92;letter-spacing:-.03em;margin:0 0 24px;font-weight:300;}
  .h3 .lede h1 em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--teal);font-weight:400;}
  .h3 .lede .deck{font-family:'Newsreader',serif;font-size:18px;line-height:1.5;color:var(--ink-soft);margin:0 0 28px;max-width:34ch;}
  .h3 .lede .ctas{display:flex;gap:10px}
  .h3 .photo{position:relative;background:var(--pink);border-right:1px solid var(--rule);overflow:hidden;}
  .h3 .photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;}
  .h3 .facts{padding:40px;display:flex;flex-direction:column;}
  .h3 .facts h4{font:500 11px/1 'Inter',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 24px;}
  .h3 .facts ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:18px;border-top:1px solid var(--rule);}
  .h3 .facts li{display:grid;grid-template-columns:auto 1fr;gap:14px;padding-top:18px;border-bottom:1px solid var(--rule);padding-bottom:18px;}
  .h3 .facts li:last-child{border-bottom:none}
  .h3 .facts .num{font-family:'Fraunces',serif;font-size:28px;line-height:1;color:var(--teal);font-weight:400;font-feature-settings:"tnum"}
  .h3 .facts .lab{font:500 13px/1.4 'Inter',sans-serif;color:var(--ink);}
  .h3 .facts .lab small{display:block;font:400 12px/1.4 'Inter',sans-serif;color:var(--ink-soft);margin-top:3px;letter-spacing:0;text-transform:none;}

  /* ---------- (4) functional / search-led with live filtering ---------- */
  .h4{background:var(--pink);padding:48px 64px 0;}
  .h4 .topline{display:flex;align-items:center;justify-content:space-between;color:var(--ink-soft);font:500 13px/1 'Inter',sans-serif;margin-bottom:32px;}
  .h4 .topline .nav{display:flex;gap:22px}
  .h4 .topline .nav a{color:var(--ink);text-decoration:none;}
  .h4 .topline .nav a.active{color:var(--teal);font-weight:600}
  .h4 .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:end;}
  .h4 .col-l{padding-bottom:48px}
  .h4 h1{font-family:'Fraunces',serif;font-weight:400;font-size:96px;line-height:.95;letter-spacing:-.03em;margin:14px 0 12px;}
  .h4 h1 em{font-style:italic;color:var(--teal);font-weight:400;}
  .h4 .deck{font:400 15px/1.55 'Inter',sans-serif;color:var(--ink-soft);max-width:46ch;margin:0 0 28px;}
  .h4 .searchbar{background:#fff;border-radius:18px;padding:10px;display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:0;box-shadow:0 8px 30px rgba(31,26,23,.12);align-items:stretch;}
  .h4 .field{padding:10px 14px;border-right:1px solid rgba(31,26,23,.08);display:flex;flex-direction:column;gap:4px;}
  .h4 .field:last-of-type{border-right:none}
  .h4 .field label{font:600 10px/1 'Inter',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);}
  .h4 .field input,.h4 .field select{border:none;outline:none;background:transparent;font:500 14px/1.2 'Inter',sans-serif;color:var(--ink);padding:2px 0;font-family:inherit;}
  .h4 .field input::placeholder{color:rgba(31,26,23,.4)}
  .h4 .searchbar .btn-primary{margin:0;border-radius:14px;padding:0 22px;}
  .h4 .chips{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .h4 .chip{background:rgba(255,255,255,.55);border:1px solid rgba(31,26,23,.12);border-radius:999px;padding:7px 13px;font:500 12px/1 'Inter',sans-serif;color:var(--ink-soft);cursor:pointer;transition:background .12s, border-color .12s, color .12s;}
  .h4 .chip:hover{background:rgba(255,255,255,.85)}
  .h4 .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .h4 .col-r{position:relative;align-self:end;}
  .h4 .col-r .frame{position:relative;}
  .h4 .col-r .frame img{width:100%;display:block;}
  .h4 .float{position:absolute;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 14px 36px rgba(31,26,23,.15);font:500 13px/1.3 'Inter',sans-serif;color:var(--ink);min-width:180px}
  .h4 .float .row{display:flex;justify-content:space-between;align-items:center;gap:14px;}
  .h4 .float .ttl{font:600 11px/1 'Inter',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .h4 .float .big{font-family:'Fraunces',serif;font-size:24px;line-height:1;color:var(--ink);font-weight:400}
  .h4 .float .delta{color:var(--teal);font:600 12px/1 'Inter',sans-serif}
  .h4 .float-a{top:40px;left:-30px;}
  .h4 .float-b{bottom:80px;right:-20px;width:200px;}
  .h4 .results-strip{margin-top:36px;background:rgba(255,255,255,.45);border-radius:24px 24px 0 0;padding:24px 28px;border:1px solid rgba(31,26,23,.08);border-bottom:none;display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;}
  .h4 .results-strip .count{font-family:'Fraunces',serif;font-size:28px;line-height:1;color:var(--ink);font-weight:400;}
  .h4 .results-strip .count small{font:500 12px/1 'Inter',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-top:6px;font-family:'Inter',sans-serif;}
  .h4 .preview-cards{display:flex;gap:10px;overflow:hidden;}
  .h4 .pcard{background:#fff;border-radius:12px;padding:12px 14px;min-width:180px;border:1px solid rgba(31,26,23,.06);}
  .h4 .pcard .role{font:600 13px/1.2 'Inter',sans-serif;color:var(--ink);}
  .h4 .pcard .meta{display:flex;justify-content:space-between;margin-top:8px;font:500 12px/1 'Inter',sans-serif;color:var(--ink-soft);}
  .h4 .pcard .meta .pay{color:var(--teal);font-weight:600}

  /* ---------- (5) oversized type / asymmetric collage ---------- */
  .h5{background:var(--cream);padding:60px 72px;position:relative;overflow:hidden;}
  .h5 .swatch{position:absolute;inset:0;pointer-events:none;}
  .h5 .swatch::before{content:"";position:absolute;left:-80px;top:-80px;width:540px;height:540px;border-radius:50%;background:var(--pink-light);}
  .h5 .swatch::after{content:"";position:absolute;right:-100px;bottom:-160px;width:420px;height:420px;border-radius:50%;background:var(--teal-soft);}
  .h5 .inner{position:relative;}
  .h5 .row1{display:grid;grid-template-columns:auto 1fr auto;align-items:center;margin-bottom:28px;font:500 12px/1 'Inter',sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);}
  .h5 .row1 .badge{display:inline-flex;align-items:center;gap:8px;background:#fff;padding:8px 14px;border-radius:999px;border:1px solid var(--rule);}
  .h5 .row1 .badge .dot{background:var(--teal);width:7px;height:7px;border-radius:99px;display:inline-block;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
  .h5 .row1 .crumbs{justify-self:center;display:flex;gap:14px;color:rgba(31,26,23,.5)}
  .h5 .row1 .crumbs span:not(:last-child)::after{content:"·";margin-left:14px}
  .h5 .row1 .crumbs span.now{color:var(--ink)}
  .h5 .stage{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;align-items:end;}
  .h5 h1{font-family:'Fraunces',serif;font-weight:300;font-size:200px;line-height:.86;letter-spacing:-.05em;margin:0;color:var(--ink);}
  .h5 h1 .small{display:block;font-family:'Instrument Serif',serif;font-style:italic;font-size:96px;color:var(--teal);font-weight:400;margin-top:-12px;letter-spacing:-.02em;}
  .h5 h1 .small em{font-family:'Fraunces',serif;font-style:italic;color:var(--teal)}
  .h5 .photo{position:relative;border-radius:0;overflow:hidden;align-self:end;height:380px;background:var(--pink);}
  .h5 .photo img{width:100%;height:100%;object-fit:cover;object-position:center}
  .h5 .photo .tag{position:absolute;left:16px;bottom:16px;background:rgba(255,255,255,.92);padding:8px 12px;border-radius:8px;font:500 11px/1.3 'Inter',sans-serif;color:var(--ink);max-width:200px;}
  .h5 .photo .tag b{color:var(--teal);display:block;font-weight:700;font-size:13px;margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase;}
  .h5 .footer{display:grid;grid-template-columns:auto 1fr auto;gap:40px;align-items:center;margin-top:36px;padding-top:24px;border-top:1px solid var(--rule);}
  .h5 .footer .deck{font:400 14px/1.55 'Inter',sans-serif;color:var(--ink-soft);max-width:54ch;margin:0;}
  .h5 .footer .ctas{display:flex;gap:10px}
  .h5 .footer .stats{display:flex;gap:36px;font-family:'Fraunces',serif;}
  .h5 .footer .stats div{font-size:22px;line-height:1;font-weight:400}
  .h5 .footer .stats div small{display:block;font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:6px;font-weight:500;}

  /* arrow */
  .arr{display:inline-block;width:14px;height:10px;position:relative;}
  .arr::before{content:"";position:absolute;left:0;right:0;top:4px;height:1.5px;background:currentColor;}
  .arr::after{content:"";position:absolute;right:0;top:0;width:7px;height:7px;border-top:1.5px solid currentColor;border-right:1.5px solid currentColor;transform:rotate(45deg);}

  /* underline link */
  .ulink{color:var(--ink);text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:1px;}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="heroes.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App(){
    return (
      <DesignCanvas>
        <DCSection id="layouts" title="1099 PMHNP Jobs — Hero Layouts" subtitle="Five redesigns for the listing-page hero. Drag to reorder. Click ⤢ to focus.">
          <DCArtboard id="h1" label="01 · Editorial baseline (reference)" width={1440} height={620}>
            <window.Hero1/>
          </DCArtboard>
          <DCArtboard id="h2" label="02 · Full-bleed display" width={1440} height={780}>
            <window.Hero2/>
          </DCArtboard>
          <DCArtboard id="h3" label="03 · Magazine grid" width={1440} height={620}>
            <window.Hero3/>
          </DCArtboard>
          <DCArtboard id="h4" label="04 · Search-led (interactive)" width={1440} height={760}>
            <window.Hero4/>
          </DCArtboard>
          <DCArtboard id="h5" label="05 · Oversized type / collage" width={1440} height={780}>
            <window.Hero5/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
